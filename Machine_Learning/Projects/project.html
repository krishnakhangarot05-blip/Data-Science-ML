<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Laptop Price Predictor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

header{
    text-align:center;
    padding:25px;
    color:white;
    font-size:28px;
    font-weight:600;
    background:rgba(0,0,0,0.2);
    backdrop-filter:blur(10px);
}

main{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 20px;
}

.form-card{
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(20px);
    padding:40px;
    border-radius:20px;
    width:100%;
    max-width:1000px;
    box-shadow:0 20px 50px rgba(0,0,0,0.4);
}

.form-card h2{
    text-align:center;
    margin-bottom:30px;
    color:white;
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
}

.form-group{display:flex;flex-direction:column;}

label{color:white;margin-bottom:6px;font-size:14px;}

input,select{
    padding:10px;
    border-radius:8px;
    border:none;
    outline:none;
    font-size:14px;
}

.button-container{text-align:center;margin-top:30px;}

button{
    background:linear-gradient(90deg,#00c6ff,#0072ff);
    color:white;
    padding:12px 30px;
    border:none;
    border-radius:30px;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

button:hover{transform:scale(1.05);}

.result-card{
    margin-top:25px;
    text-align:center;
    font-size:22px;
    font-weight:600;
    color:white;
    padding:15px;
    border-radius:12px;
    background:rgba(0,0,0,0.3);
}

footer{
    text-align:center;
    padding:15px;
    background:rgba(0,0,0,0.3);
    color:white;
    font-size:14px;
}

@media(max-width:768px){
    .form-grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header>
💻 Laptop Price Prediction System
</header>

<main>
<div class="form-card">

<h2>Enter Laptop Specifications</h2>

<form action="{{ url_for('predict') }}" method="post">

<div class="form-grid">

<!-- BRAND -->
<div class="form-group">
<label>Brand</label>
<select name="brand" required>
<option>ASUS</option>
<option>Lenovo</option>
<option>acer</option>
<option>Avita</option>
<option>HP</option>
<option>DELL</option>
<option>MSI</option>
<option>APPLE</option>
</select>
</div>

<!-- PROCESSOR BRAND -->
<div class="form-group">
<label>Processor Brand</label>
<select name="processor_brand" required>
<option>Intel</option>
<option>AMD</option>
<option>M1</option>
</select>
</div>

<!-- PROCESSOR NAME -->
<div class="form-group">
<label>Processor Name</label>
<select name="processor_name" required>
<option>Core i3</option>
<option>Core i5</option>
<option>Core i7</option>
<option>Core i9</option>
<option>Celeron Dual</option>
<option>Pentium Quad</option>
<option>Ryzen 3</option>
<option>Ryzen 5</option>
<option>Ryzen 7</option>
<option>Ryzen 9</option>
<option>M1</option>
</select>
</div>

<!-- GENERATION -->
<div class="form-group">
<label>Processor Generation</label>
<select name="processor_gnrtn" required>
<option>10th</option>
<option>11th</option>
<option>12th</option>
<option>9th</option>
<option>8th</option>
<option>7th</option>
<option>4th</option>
<option>Not Available</option>
</select>
</div>

<!-- RAM -->
<div class="form-group">
<label>RAM</label>
<select name="ram_gb">
<option>4 GB</option>
<option>8 GB</option>
<option>16 GB</option>
<option>32 GB</option>
</select>
</div>

<!-- RAM TYPE -->
<div class="form-group">
<label>RAM Type</label>
<select name="ram_type">
<option>DDR4</option>
<option>LPDDR4</option>
<option>LPDDR4X</option>
<option>DDR5</option>
<option>DDR3</option>
<option>LPDDR3</option>
</select>
</div>

<!-- SSD -->
<div class="form-group">
<label>SSD Storage</label>
<select name="ssd">
<option>0 GB</option>
<option>128 GB</option>
<option>256 GB</option>
<option>512 GB</option>
<option>1024 GB</option>
<option>2048 GB</option>
<option>3072 GB</option>
</select>
</div>

<!-- HDD -->
<div class="form-group">
<label>HDD Storage</label>
<select name="hdd">
<option>0 GB</option>
<option>512 GB</option>
<option>1024 GB</option>
<option>2048 GB</option>
</select>
</div>

<!-- OS -->
<div class="form-group">
<label>Operating System</label>
<select name="os">
<option>Windows</option>
<option>DOS</option>
<option>Mac</option>
</select>
</div>

<!-- OS BIT -->
<div class="form-group">
<label>OS Bit</label>
<select name="os_bit">
<option>64-bit</option>
<option>32-bit</option>
</select>
</div>

<!-- WARRANTY -->
<div class="form-group">
<label>Warranty</label>
<select name="warranty">
<option>No warranty</option>
<option>1 year</option>
<option>2 years</option>
<option>3 years</option>
</select>
</div>

<!-- MS OFFICE -->
<div class="form-group">
<label>MS Office Included</label>
<select name="msoffice">
<option>Yes</option>
<option>No</option>
</select>
</div>

<!-- RATING -->
<div class="form-group">
<label>Rating</label>
<select name="rating">
<option>1 star</option>
<option>2 stars</option>
<option>3 stars</option>
<option>4 stars</option>
<option>5 stars</option>
</select>
</div>

<!-- NUMBER OF RATINGS -->
<div class="form-group">
<label>Number of Ratings</label>
<input type="number" name="num_ratings" required>
</div>

<!-- NUMBER OF REVIEWS -->
<div class="form-group">
<label>Number of Reviews</label>
<input type="number" name="num_reviews" required>
</div>

</div>

<div class="button-container">
<button type="submit">Predict Laptop Price</button>
</div>

</form>

{% if prediction %}
<div class="result-card">
{{ prediction }}
</div>
{% endif %}

</div>
</main>

<footer>
© 2026 Laptop Price Prediction System | Machine Learning Project 💻
</footer>

</body>
</html>
